hyperparameters:
  lr: 1.0e-4
  gamma: 0.99
  clip_eps: 0.18
  batch_size: 128
  epochs: 20

environment:
  map_name: "DefeatRoaches"
  visualize: false
  use_action_printer: false
  total_episodes: 10000
  steps_per_episode: 600
  update_frequency: 10
  target_reward: 25.0
  reward_window: 200
  checkpoint_path: "checkpoint.pth"
  log_frequency: 10
  db_path: "training_logs.db"

model:
  spatial_input_shape: [27, 84, 84]
  vector_input_dim: 100
  action_dim: 3   # 0=attack, 1=move, 2=no-op
  num_steps: 8

  # Multi-temporal time constants (learnable — these are starting points)
  snn_layer1_alpha: 0.5   # fast interneurons: rapid synaptic decay
  snn_layer1_beta: 0.8
  snn_layer2_alpha: 0.8   # medium pyramidal: slower synaptic filtering
  snn_layer2_beta: 0.9
  snn_layer3_beta: 0.95   # slow integrator: persistent working memory

  # Spiking self-attention
  attention_embed_dim: 64
  attention_pool_size: 7
  attention_beta: 0.5     # Q/K/V spike encoder decay
