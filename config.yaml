hyperparameters:
  lr: 5.0e-5
  lr_min: 5.0e-6
  gamma: 0.99
  clip_eps: 0.10
  batch_size: 2048
  epochs: 4
  entropy_coef: 0.01
  critic_loss_coef: 0.5
  rollout_steps: 2048
  tbptt_window: 128
  rollout_cache_spatial_dtype: "float32"
  target_kl: 0.03
  reward_scale: 1.0
  right_click_curriculum_updates: 120
  right_click_curriculum_noop_logit_penalty: 2.0

reward:
  name: "defeat_roaches_v4"
  damage_dealt_coef: 0.15
  damage_taken_coef: 0.10
  kill_reward_coef: 30.0
  roach_kill_score_value: 100.0
  win_reward: 60.0
  loss_penalty: 30.0
  step_penalty: 0.005
  target_distance: 17.0
  distance_band_low: 14.0
  distance_band_high: 21.0
  distance_reward_coef: 0.20
  distance_reward_clip: 1.0
  distance_hold_bonus: 0.05
  distance_gate: 30.0
  smart_target_radius: 6.0
  smart_near_enemy_reward: 0.08
  smart_far_enemy_penalty: 0.03
  noop_visible_enemy_penalty: 0.02
  smart_outcome_window: 5
  smart_attack_likely_reward: 0.12
  smart_fired_likely_reward: 0.06
  smart_attack_intent_reward: 0.02
  smart_null_unclear_penalty: 0.02

environment:
  map_name: "DefeatRoaches"
  visualize: true
  use_action_printer: false
  total_episodes: 10000
  steps_per_episode: 3600
  target_reward: 25.0
  reward_window: 200
  run_name: "banana_glasses_v6_b2048_e4_a10"
  models_dir: "models"
  analysis_dir: "analysis_results"
  checkpoint_path: "checkpoint.pth"
  best_checkpoint_path: "best_checkpoint.pth"
  best_min_episodes: 50
  log_frequency: 1
  db_path: "training_logs.db"
  use_observation_inspector: false
  observation_inspector_output_path: "analysis_results/observation_space.jsonl"
  observation_inspector_every_n_steps: 10
  observation_inspector_max_unit_samples: 5
  use_policy_input_diagnostics: false
  policy_input_diagnostics_output_path: "analysis_results/policy_input_diagnostics.jsonl"
  policy_input_diagnostics_every_n_steps: 1
  policy_input_diagnostics_max_entity_samples: 3
  policy_input_diagnostics_max_selection_samples: 3
  use_available_actions_diagnostics: false
  available_actions_diagnostics_output_path: "analysis_results/available_actions_diagnostics.jsonl"
  available_actions_diagnostics_every_n_steps: 1
  use_last_action_diagnostics: false
  last_action_diagnostics_output_path: "analysis_results/last_action_diagnostics.jsonl"
  last_action_diagnostics_every_n_steps: 1
  use_score_diagnostics: false
  score_diagnostics_output_path: "analysis_results/score_diagnostics.jsonl"
  score_diagnostics_every_n_steps: 1
  eval_frequency: 50
  eval_episodes: 5
  # Per-episode step cap for deterministic eval (Ray path); defaults to
  # steps_per_episode. Lower it to shorten the periodic eval stall.
  eval_steps_per_episode: 3600

distributed:
  enabled: false
  num_rollout_actors: 10
  # Reserved for a future async dedicated eval actor. Eval currently runs on
  # the training actors (their normalizers are live), so this stays 0.
  num_eval_actors: 0
  fragment_steps: 256
  global_rollout_steps: 2560
  learner_device: "cuda"
  actor_device: "cpu"
  sc2_runtime_profile: "linux_headless"
  serialize_env_resets: true
  ray_local_mode: false
  include_dashboard: false
  object_store_memory_gb: 8
  actor_cpus: 1
  learner_gpus: 1
  # Cadence (in learner updates) for deterministic eval + best_checkpoint save.
  eval_every_updates: 50
  max_updates: 0
  required_policy_protocol_version: 3
  required_policy_input_schema: "stream_action_effect_feedback_v2"

model:
  spatial_input_shape: [27, 84, 84]
  vector_input_dim: 15
  action_dim: 3
  screen_size: 84
  num_steps: 1
  amp_dtype: "bf16"
  fast_token_snn_alpha: 0.55
  fast_token_snn_beta: 0.65
  slow_token_snn_alpha: 0.92
  slow_token_snn_beta: 0.97
  temporal_combine_mode: "mean"
  attention_embed_dim: 64
  attention_pool_size: 7
  attention_beta: 0.5
  spatial_head_type: "coarse_to_fine"
  coarse_grid_size: 7
  local_grid_size: 12
  target_decode_mode: "center"
  # Stage 1 spatial fix: feed pre-pool conv2 features (84x84x32) to the fine
  # stage so sub-cell clicks can depend on the observation. Checkpoints made
  # with this off cannot be loaded while it is on (new head parameters), so
  # flip back to false to eval pre-V6 checkpoints.
  fine_skip_connection: true
  fine_skip_dim: 32
